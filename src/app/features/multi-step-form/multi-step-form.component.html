<div class="multi-step-form">
  <div class="form-header">
    <h1>Installation Scoping Questionnaire</h1>
  </div>

  <div class="steps-container">
    <!-- Steps Indicator -->
    <div class="steps-indicator">
      <div class="step" [class.active]="currentStep >= 1">
        <span class="step-number">1</span>
        <span class="step-label">Store Details</span>
      </div>
      <div class="step" [class.active]="currentStep >= 2">
        <span class="step-number">2</span>
        <span class="step-label">IT & Network</span>
      </div>
      <div class="step" [class.active]="currentStep >= 3">
        <span class="step-number">3</span>
        <span class="step-label">Step 3</span>
      </div>
    </div>

    <!-- Form Content -->
    <div class="form-content">
      <app-step1 *ngIf="currentStep === 1" (nextStep)="goToStep(2)"></app-step1>
      <app-step2 *ngIf="currentStep === 2" (nextStep)="goToStep(3)" (prevStep)="goToStep(1)"></app-step2>
    </div>
  </div>
</div>
